<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CECA Online Exam Portal</title>
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .custom-radio input[type="radio"] { display: none; }
        .custom-radio label { display: block; padding: 1.25rem; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; transition: all 0.2s; position: relative; }
        .custom-radio input[type="radio"]:checked + label { border-color: #4f46e5; background-color: #f5f3ff; font-weight: 600; }
        .custom-radio input[type="radio"]:checked + label::after { content: '\eb7b'; font-family: 'remixicon'; position: absolute; right: 1.25rem; color: #4f46e5; font-size: 1.25rem; }
    </style>
</head>
<body>

    <div id="landing-page" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-3xl w-full bg-white rounded-3xl shadow-2xl p-10 text-center border border-gray-100">
            <h1 class="text-4xl font-black text-gray-900 mb-2">CECA Examination Portal</h1>
            <p class="text-gray-500 mb-10 text-lg">Select a question set to begin your 50-question assessment.</p>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <button onclick="startExam(1)" class="p-6 bg-white border-2 border-gray-100 rounded-2xl hover:border-indigo-600 transition-all text-left shadow-sm">
                    <div class="text-indigo-600 font-bold mb-1">Set 01</div>
                    <div class="text-xl font-black text-gray-800">Units I - III</div>
                </button>
                <button onclick="startExam(2)" class="p-6 bg-white border-2 border-gray-100 rounded-2xl hover:border-emerald-600 transition-all text-left shadow-sm">
                    <div class="text-emerald-600 font-bold mb-1">Set 02</div>
                    <div class="text-xl font-black text-gray-800">Units I - V</div>
                </button>
                <button onclick="startExam(3)" class="p-6 bg-white border-2 border-gray-100 rounded-2xl hover:border-purple-600 transition-all text-left shadow-sm">
                    <div class="text-purple-600 font-bold mb-1">Set 03</div>
                    <div class="text-xl font-black text-gray-800">Units I - V</div>
                </button>
            </div>
        </div>
    </div>

    <div id="exam-page" class="hidden min-h-screen flex flex-col">
        <header class="bg-white border-b p-5 sticky top-0 z-50 flex justify-between items-center">
            <span class="font-black text-gray-900 text-xl tracking-tight">CECA EXAM</span>
            <div id="timer" class="px-6 py-2 bg-red-50 text-red-600 rounded-full font-mono font-bold text-lg">90:00</div>
        </header>

        <main class="flex-1 max-w-4xl w-full mx-auto p-4 py-12">
            <div class="bg-white rounded-3xl shadow-xl p-8 md:p-12 border border-gray-100">
                <div class="flex justify-between items-end mb-10">
                    <div>
                        <div id="unit-label" class="text-indigo-600 font-bold text-sm uppercase tracking-widest mb-1">UNIT I</div>
                        <h2 id="question-text" class="text-2xl font-bold text-gray-900 leading-snug"></h2>
                    </div>
                    <div class="text-right shrink-0">
                        <span class="text-gray-400 text-sm font-bold block">QUESTION</span>
                        <span class="text-3xl font-black text-gray-900"><span id="q-num">1</span><span class="text-gray-300">/50</span></span>
                    </div>
                </div>
                <div id="options-container" class="space-y-4"></div>
                <div class="flex justify-between mt-12 pt-8 border-t border-gray-50">
                    <button id="prev-btn" onclick="nav(-1)" class="px-6 py-3 font-bold text-gray-400 hover:text-gray-900 transition">Previous</button>
                    <button id="next-btn" onclick="nav(1)" class="px-10 py-4 bg-gray-900 text-white rounded-2xl font-bold hover:bg-black transition">Next Question</button>
                    <button id="submit-btn" onclick="finish()" class="hidden px-10 py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition">Finish Exam</button>
                </div>
            </div>
        </main>
    </div>

    <div id="result-page" class="hidden min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 text-center border border-gray-100">
            <h2 class="text-2xl font-black text-gray-900 mb-6">Exam Result</h2>
            <div class="text-6xl font-black text-indigo-600 mb-2" id="res-percent">0%</div>
            <div class="text-gray-400 font-bold mb-8" id="res-raw">0/50</div>
            <button onclick="location.reload()" class="w-full py-4 bg-gray-100 text-gray-900 rounded-2xl font-bold hover:bg-gray-200 transition">Try Again</button>
        </div>
    </div>

<script>
const masterBank = [
  { u: 1, q: "0.25 as a percentage is", o: ["2.5%", "25%", "50%", "75%"], a: 1 },

  { u: 1, q: "45 is what percent of 180?", o: ["20%", "25%", "30%", "35%"], a: 1 },

  { u: 1, q: "10% of 2 kg equals", o: ["100 g", "200 g", "250 g", "500 g"], a: 1 },

  { u: 1, q: "Average of 5, 10, 15 is", o: ["8", "10", "12", "15"], a: 1 },

  { u: 1, q: "Average of first 20 natural numbers is", o: ["9.5", "10", "10.5", "11"], a: 2 },

  { u: 1, q: "HCF of 18 and 24 is", o: ["3", "6", "9", "12"], a: 1 },

  { u: 1, q: "LCM of 10 and 15 is", o: ["20", "25", "30", "40"], a: 2 },

  { u: 1, q: "LCM of 6, 8, 12 is", o: ["12", "18", "24", "48"], a: 2 },

  { u: 1, q: "HCF of 36 and 54 is", o: ["6", "9", "18", "27"], a: 2 },

  { u: 1, q: "Two numbers are co-prime if their HCF is", o: ["0", "1", "2", "Same"], a: 1 },

  { u: 1, q: "Square, Rectangle, Triangle, Cube", o: ["Square", "Rectangle", "Triangle", "Cube"], a: 3 },

  { u: 1, q: "Pen, Pencil, Eraser, Book", o: ["Pen", "Pencil", "Eraser", "Book"], a: 3 },

  { u: 1, q: "Distance covered in 3 hours at 50 km/hr is", o: ["120 km", "140 km", "150 km", "180 km"], a: 2 },

  { u: 1, q: "Relative speed of two trains moving opposite at 40 & 60 km/hr is", o: ["20", "60", "80", "100"], a: 3 },

  { u: 1, q: "Time = Distance / ?", o: ["Speed", "Power", "Work", "Force"], a: 0 },

  { u: 1, q: "A man walks at 5 km/hr for 2 hrs. Distance is", o: ["8 km", "9 km", "10 km", "12 km"], a: 2 },

  { u: 1, q: "A and B together finish work in 12 days. Work per day is", o: ["1/10", "1/12", "1/15", "1/20"], a: 1 },

  { u: 1, q: "6 men complete work in 12 days. Men needed in 6 days", o: ["6", "10", "12", "15"], a: 2 },

  { u: 1, q: "Work and time are", o: ["Directly proportional", "Inversely proportional", "Equal", "Independent"], a: 1 },

  { u: 1, q: "A does work in 20 days, B in 30 days. Together they take", o: ["10", "12", "15", "18"], a: 1 },

  { u: 1, q: "Father’s age is twice son’s age. If son is 15, father is", o: ["25", "30", "35", "40"], a: 1 },

  { u: 1, q: "Average age of 4 people is 30. Total age is", o: ["90", "100", "110", "120"], a: 3 },

  { u: 1, q: "Age of a person 10 years ago was 20. Present age is", o: ["25", "28", "30", "35"], a: 2 },

  { u: 1, q: "If present age is x, age after 5 years is", o: ["x−5", "x", "x+5", "5x"], a: 2 },

  { u: 1, q: "Ratio of 15 and 20 is", o: ["3:4", "4:3", "2:3", "5:6"], a: 0 },

  { u: 1, q: "Ratio of 500 g to 2 kg is", o: ["1:4", "1:2", "2:1", "4:1"], a: 0 },

  { u: 1, q: "Simplest form of 12:18 is", o: ["3:4", "2:3", "4:5", "6:9"], a: 1 },

  { u: 1, q: "SI on ₹1,000 at 10% for 1 year is", o: ["₹50", "₹100", "₹150", "₹200"], a: 1 },

  { u: 1, q: "Time in SI is measured in", o: ["Days", "Months", "Years", "Hours"], a: 2 },

  { u: 1, q: "Rate of interest is expressed in", o: ["Rupees", "Percentage", "Ratio", "Time"], a: 1 },

  { u: 1, q: "A, C, E, G, ?", o: ["H", "I", "J", "K"], a: 1 },

  { u: 1, q: "Z, X, V, T, ?", o: ["R", "S", "P", "Q"], a: 0 },

  { u: 1, q: "B, D, G, K, ?", o: ["O", "M", "N", "P"], a: 0 },

  { u: 1, q: "@, #, $, %, ?", o: ["&", "*", "^", "!"], a: 0 },

  { u: 1, q: "M, N, P, Q, S, ?", o: ["T", "U", "R", "V"], a: 0 },

  { u: 1, q: "a, c, f, j, ?", o: ["n", "o", "p", "q"], a: 0 },

  { u: 1, q: "Statement: Smoking is injurious to health. Argument: It causes cancer.", o: ["Strong", "Weak", "Irrelevant", "False"], a: 0 },

  { u: 1, q: "Statement: Schools should have uniforms. Argument: It creates equality.", o: ["Strong", "Weak", "False", "Illogical"], a: 0 },

  { u: 1, q: "An article is bought for ₹800 and sold for ₹1,000. Profit %?", o: ["20%", "22%", "25%", "30%"], a: 2 },

  { u: 1, q: "Selling price is ₹1,200 and gain is 20%. Cost price?", o: ["₹900", "₹1,000", "₹1,050", "₹1,100"], a: 1 },

  { u: 1, q: "CP = ₹500, SP = ₹450. Loss %?", o: ["5%", "8%", "10%", "15%"], a: 2 },

  { u: 1, q: "Number Series: 1,1,2,3,5,?", o: ["6", "7", "8", "9"], a: 2 },

  { u: 1, q: "Number Series: 2,6,18,54,?", o: ["108", "162", "216", "324"], a: 1 },

  { u: 1, q: "Number Series: 7,14,28,?,112", o: ["42", "49", "56", "84"], a: 2 },

  { u: 1, q: "Find odd: 2,4,6,9,8", o: ["2", "4", "6", "9"], a: 3 },

  { u: 1, q: "Find odd: Apple, Mango, Banana, Carrot", o: ["Apple", "Mango", "Banana", "Carrot"], a: 3 },

  { u: 1, q: "Find odd: 3,5,7,9", o: ["3", "5", "7", "9"], a: 3 }
]
let activeSet = [];
let responses = [];
let cursor = 0;
let time = 5400;

function startExam(setNum) {
    let pool = (setNum === 1) ? masterBank.filter(x => x.u <= 3) : masterBank;
    activeSet = pool.sort(() => 0.5 - Math.random()).slice(0, 50);
    responses = new Array(activeSet.length).fill(null);
    document.getElementById('landing-page').classList.add('hidden');
    document.getElementById('exam-page').classList.remove('hidden');
    render();
    setInterval(() => {
        time--;
        let m = Math.floor(time / 60);
        let s = time % 60;
        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        if(time <= 0) finish();
    }, 1000);
}

function render() {
    const data = activeSet[cursor];
    document.getElementById('q-num').innerText = cursor + 1;
    document.getElementById('unit-label').innerText = `Unit ${data.u}`;
    document.getElementById('question-text').innerText = data.q;
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    data.o.forEach((txt, i) => {
        const div = document.createElement('div');
        div.className = 'custom-radio';
        div.innerHTML = `<input type="radio" name="exam-q" id="opt${i}" ${responses[cursor] === i ? 'checked' : ''}><label for="opt${i}">${txt}</label>`;
        div.onclick = () => responses[cursor] = i;
        container.appendChild(div);
    });
    document.getElementById('prev-btn').style.opacity = cursor === 0 ? '0' : '1';
    if(cursor === activeSet.length - 1) {
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('submit-btn').classList.remove('hidden');
    } else {
        document.getElementById('next-btn').classList.remove('hidden');
        document.getElementById('submit-btn').classList.add('hidden');
    }
}

function nav(dir) {
    cursor += dir;
    render();
}

function finish() {
    let score = 0;
    activeSet.forEach((q, i) => { if(responses[i] === q.a) score++; });
    document.getElementById('exam-page').classList.add('hidden');
    document.getElementById('result-page').classList.remove('hidden');
    document.getElementById('res-percent').innerText = `${Math.round((score / activeSet.length) * 100)}%`;
    document.getElementById('res-raw').innerText = `${score}/${activeSet.length}`;
}
</script>
</body>
</html>
