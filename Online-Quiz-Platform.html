<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CECA Online Exam</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
body { font-family: sans-serif; background:#f8fafc; }
.custom-radio input { display:none; }
.custom-radio label {
  display:block; padding:15px; border:2px solid #ddd;
  border-radius:10px; cursor:pointer;
}
.custom-radio input:checked + label {
  border-color:#4f46e5; background:#eef2ff;
}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing" class="h-screen flex items-center justify-center">
  <div class="text-center">
    <h1 class="text-3xl font-bold mb-6">Online Exam</h1>

    <button onclick="startExam(1)" class="bg-indigo-600 text-white px-6 py-3 rounded m-2">Set 1</button>
    <button onclick="startExam(2)" class="bg-green-600 text-white px-6 py-3 rounded m-2">Set 2</button>
    <button onclick="startExam(3)" class="bg-purple-600 text-white px-6 py-3 rounded m-2">Set 3</button>
  </div>
</div>

<!-- EXAM -->
<div id="exam" class="hidden p-6 max-w-3xl mx-auto">

  <div class="flex justify-between mb-4">
    <h2 id="qNum"></h2>
    <div id="timer" class="text-red-600 font-bold"></div>
  </div>

  <h3 id="question" class="text-xl font-semibold mb-6"></h3>

  <div id="options"></div>

  <div class="flex justify-between mt-6">
    <button onclick="nav(-1)">Prev</button>
    <button onclick="nav(1)" id="nextBtn">Next</button>
    <button onclick="finish()" id="submitBtn" class="hidden">Submit</button>
  </div>

</div>

<!-- RESULT -->
<div id="result" class="hidden text-center mt-20">
  <h1 class="text-3xl font-bold mb-4">Result</h1>
  <h2 id="score"></h2>
  <button onclick="location.reload()" class="mt-4 bg-gray-200 px-4 py-2 rounded">Restart</button>
</div>

<script>

// ===== QUESTION BANK =====
const masterBank = [
  {q:"2+2=?", o:["2","3","4","5"], a:2},
  {q:"5*2=?", o:["5","10","15","20"], a:1},
  {q:"Capital of India?", o:["Delhi","Mumbai","Chennai","Kolkata"], a:0},
  {q:"HTML stands for?", o:["Hyper Text Markup Language","High Tool","Home Tool","None"], a:0},
  {q:"CSS is used for?", o:["Styling","Logic","Database","Server"], a:0},
  {q:"JS is?", o:["Language","Database","OS","None"], a:0},
  {q:"10/2=?", o:["2","3","5","6"], a:2},
  {q:"Square of 4?", o:["8","12","16","20"], a:2},
  {q:"Binary of 2?", o:["10","11","01","00"], a:0},
  {q:"RAM is?", o:["Storage","Volatile memory","CPU","None"], a:1}
];

// ===== GLOBALS =====
let activeSet = [];
let answers = [];
let index = 0;
let time = 600;
let timerInterval;

// ===== START EXAM =====
function startExam(set) {

  clearInterval(timerInterval); // FIX

  time = 600; // reset time

  activeSet = [...masterBank].sort(() => Math.random()-0.5);
  activeSet = activeSet.slice(0, Math.min(10, activeSet.length));

  answers = new Array(activeSet.length).fill(null);
  index = 0;

  document.getElementById("landing").classList.add("hidden");
  document.getElementById("exam").classList.remove("hidden");

  render();

  timerInterval = setInterval(updateTimer,1000);
}

// ===== RENDER =====
function render() {

  const q = activeSet[index];

  document.getElementById("qNum").innerText =
    `Question ${index+1}/${activeSet.length}`;

  document.getElementById("question").innerText = q.q;

  const optDiv = document.getElementById("options");
  optDiv.innerHTML = "";

  q.o.forEach((opt,i)=>{
    const div = document.createElement("div");
    div.className="custom-radio";

    div.innerHTML = `
      <input type="radio" name="q" id="o${i}" ${answers[index]==i?'checked':''}>
      <label for="o${i}">${opt}</label>
    `;

    div.onclick = () => {
      answers[index] = i;
      render();
    };

    optDiv.appendChild(div);
  });

  document.getElementById("submitBtn").classList.toggle(
    "hidden", index !== activeSet.length-1
  );

  document.getElementById("nextBtn").classList.toggle(
    "hidden", index === activeSet.length-1
  );
}

// ===== NAVIGATION =====
function nav(dir) {
  index += dir;

  if(index < 0) index = 0;
  if(index >= activeSet.length) index = activeSet.length-1;

  render();
}

// ===== TIMER =====
function updateTimer() {
  time--;

  let m = Math.floor(time/60);
  let s = time%60;

  document.getElementById("timer").innerText =
    `${m}:${s<10?'0':''}${s}`;

  if(time <= 0) finish();
}

// ===== FINISH =====
function finish() {

  clearInterval(timerInterval);

  let score = 0;

  activeSet.forEach((q,i)=>{
    if(answers[i] === q.a) score++;
  });

  document.getElementById("exam").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  document.getElementById("score").innerText =
    `Score: ${score}/${activeSet.length}`;
}

</script>

</body>
</html>
